apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdicidr
  labels:
    app: rdicidr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rdicidr
  template:
    metadata:
      labels:
        app: rdicidr
    spec:
      containers:
        - name: rdicidr
          # IMAGE_PLACEHOLDER is substituted by the CD workflow with the pushed
          # ECR image, e.g. <acct>.dkr.ecr.us-east-1.amazonaws.com/rdicidr:<sha>.
          # For manual deploys, sed-replace it (see DEPLOY-RUNBOOK.md).
          image: IMAGE_PLACEHOLDER
          # Always: the deploy pushes a new image under the same tag stream, so
          # nodes must re-pull instead of reusing a cached layer (fixes the
          # "stale image" FIXME).
          imagePullPolicy: Always
          ports:
            # nginx (see Dockerfile / nginx.conf) listens on 80, not 3000.
            - containerPort: 80
          resources:
            # Right-sized for a static nginx site. The original 4 CPU / 4Gi
            # request could not be scheduled on normal worker nodes.
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
