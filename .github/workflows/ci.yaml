name: CI Pipeline

# Root-level copy of the Part 1 pipeline, adapted for the whole assessment repo:
# the app lives in codebase/rdicidr-0.1.0, so run steps use working-directory and
# cache paths are repo-root relative. (GitHub only runs workflows under the repo
# root .github/workflows, so the copy inside codebase/... is inert here.)

on:
  push:
    branches:
      - main
      - 'feature-*'
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '15.5.1'
  REACT_APP_API_URL: https://api.rdicidr.com

defaults:
  run:
    working-directory: codebase/rdicidr-0.1.0

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - uses: actions/cache/save@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}
      - run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}
      - run: CI=true npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}
      - run: npm run build
